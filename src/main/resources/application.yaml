spring:
  application:
    name: refresh-token-auth

  datasource:
    url: jdbc:h2:mem:refresh_token_auth
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "change-this-secret-key-change-this-secret-key-123456"
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000